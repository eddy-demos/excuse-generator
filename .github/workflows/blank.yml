name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
jobs:
  server-build:
    name: Server — install & seed
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Verify seed script runs
        run: npm run db:seed

  client-build:
    name: Client — install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  api-smoke-test:
    name: API — smoke test endpoints
    runs-on: ubuntu-latest
    needs: server-build
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run db:seed
      - name: Start server
        run: |
          PORT=3001 node index.js &
          echo $! > server.pid
          for i in {1..20}; do
            if curl -sf http://localhost:3001/api/excuses > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 0.5
          done
          echo "Server failed to start"
          exit 1
      - name: Hit endpoints
        run: |
          set -e
          echo "GET /api/excuses"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/api/excuses)" = "200"

          echo "GET /api/excuses/random"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/api/excuses/random)" = "200"

          echo "POST /api/excuses (valid)"
          ID=$(curl -s -X POST http://localhost:3001/api/excuses \
            -H "Content-Type: application/json" \
            -d '{"text":"CI test","category":"work","severity":3}' \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).id))")
          test -n "$ID"

          echo "PATCH /api/excuses/:id/used"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X PATCH http://localhost:3001/api/excuses/$ID/used)" = "200"

          echo "PUT /api/excuses/:id"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X PUT http://localhost:3001/api/excuses/$ID \
            -H 'Content-Type: application/json' -d '{"severity":5}')" = "200"

          echo "POST invalid -> 400"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3001/api/excuses \
            -H 'Content-Type: application/json' -d '{"text":"","category":"bogus","severity":9}')" = "400"

          echo "DELETE /api/excuses/:id -> 204"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X DELETE http://localhost:3001/api/excuses/$ID)" = "204"

          echo "GET deleted id -> 404"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/api/excuses/$ID)" = "404"
      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [server, client]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit (high severity)
        run: npm audit --audit-level=high || true